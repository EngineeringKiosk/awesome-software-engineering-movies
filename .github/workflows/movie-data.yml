name: Movie data

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 6 2 * *" # Run at 06:00 on day-of-month 2.

jobs:
  data_workflow:
    name: Data workflow
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v7.0.0
        with:
          go-version: "1.26"
          cache-dependency-path: app/go.sum

      # Caching go modules to speed up the run
      - uses: actions/cache@v6.1.0
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build
        run: make build

      - name: awesome-software-engineering-movies Convert YAML to JSON
        run: ./awesome-software-engineering-movies convertYamlToJson --yaml-directory ../movies --json-directory ../generated

      - name: awesome-software-engineering-movies Gather additional movie data
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: ./awesome-software-engineering-movies collectMovieData --json-directory ../generated

      - name: awesome-software-engineering-movies Convert JSON to README
        run: ./awesome-software-engineering-movies convertJsonToReadme --json-directory ../generated --readme-template ../assets/README.template --readme-output ../README.md

      # Commit results back to repository
      - name: Commit changes
        id: auto-commit
        uses: stefanzweifel/git-auto-commit-action@v7.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          branch: main
          commit_message: "chore: Update generated movie content"
          commit_user_name: "GitHub Actions Bot"
          commit_user_email: "actions@github.com"
          commit_author: "GitHub Actions Bot <actions@github.com>"
          skip_push: true

      - name: Configure git identity for rebase
        if: steps.auto-commit.outputs.changes_detected == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Push changes with retry
        if: steps.auto-commit.outputs.changes_detected == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          max_retries=3
          for attempt in $(seq 1 $max_retries); do
            echo "Push attempt $attempt of $max_retries"
            if git push origin main; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push failed, pulling with rebase and retrying..."
            git pull --rebase origin main
            sleep $((attempt * 2))
          done
          echo "Push failed after $max_retries attempts"
          exit 1

      - name: Trigger webpage to sync
        uses: peter-evans/repository-dispatch@v4.0.1
        with:
          token: ${{ secrets.REPOSITORY_DISPATCH_TOKEN }}
          repository: EngineeringKiosk/webpage
          event-type: movie-list-update
